<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0710">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ABYSS DOMINION REMAKE</title>
  <link rel="stylesheet" href="./src/Styles/reset.css?v=0.9.15-alpha.3-part1">
  <link rel="stylesheet" href="./src/Styles/theme.css?v=0.9.15-alpha.3-part1">
  <link rel="stylesheet" href="./src/Styles/app.css?v=0.9.15-alpha.12-enemy-scaling">
</head>
<body>
  <div id="app"></div>
  <script>
    window.addEventListener("error", function(event) {
      const app = document.getElementById("app");
      if (!app) return;
      app.innerHTML =
        '<div style="min-height:100dvh;padding:20px;background:#0a0710;color:#fff;font-family:-apple-system,sans-serif">' +
        '<h1 style="color:#ff7785">起動エラー</h1>' +
        '<p>画面のスクショを送ってね。</p>' +
        '<pre style="white-space:pre-wrap;background:#1b1223;padding:12px;border-radius:12px">' +
        String(event.message || "Unknown error") +
        '</pre></div>';
    });
    window.addEventListener("unhandledrejection", function(event) {
      const app = document.getElementById("app");
      if (!app) return;
      app.innerHTML =
        '<div style="min-height:100dvh;padding:20px;background:#0a0710;color:#fff;font-family:-apple-system,sans-serif">' +
        '<h1 style="color:#ff7785">処理エラー</h1>' +
        '<p>画面のスクショを送ってね。</p>' +
        '<pre style="white-space:pre-wrap;background:#1b1223;padding:12px;border-radius:12px">' +
        String(event.reason?.message || event.reason || "Unknown rejection") +
        '</pre></div>';
    });
  </script>
  <script type="module">
    const ASSET_VERSION = "0.9.15-alpha.12-enemy-scaling";
    const VERSION_KEY = "abyss-dominion-asset-version";
    async function refreshStaleAssets() {
      const previous = localStorage.getItem(VERSION_KEY);
      if (previous !== ASSET_VERSION) {
        try {
          if ("caches" in window) {
            const names = await caches.keys();
            await Promise.all(names.map(name => caches.delete(name)));
          }
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(registration => registration.unregister()));
          }
        } catch (error) {
          console.warn("Cache cleanup skipped", error);
        }
        localStorage.setItem(VERSION_KEY, ASSET_VERSION);
      }
      await import(`./src/main.js?v=${ASSET_VERSION}`);
    }
    refreshStaleAssets();
  </script>
</body>
</html>
