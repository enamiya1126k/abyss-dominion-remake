<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#0a0710">
  <title>ABYSS DOMINION REMAKE</title>
  <link rel="stylesheet" href="./src/Styles/reset.css?v=0.5.0-alpha.1">
  <link rel="stylesheet" href="./src/Styles/theme.css?v=0.5.0-alpha.1">
  <link rel="stylesheet" href="./src/Styles/app.css?v=0.5.0-alpha.1">
</head>
<body>
  <div id="app"></div>
  <script>
    window.addEventListener("error", function(event) {
      const app = document.getElementById("app");
      if (!app) return;
      app.innerHTML =
        '<div style="min-height:100dvh;padding:20px;background:#0a0710;color:#fff;font-family:-apple-system,sans-serif">' +
        '<h1 style="color:#ff7785">起動エラー</h1>' +
        '<p>画面のスクショを送ってね。</p>' +
        '<pre style="white-space:pre-wrap;background:#1b1223;padding:12px;border-radius:12px">' +
        String(event.message || "Unknown error") +
        '</pre></div>';
    });
    window.addEventListener("unhandledrejection", function(event) {
      const app = document.getElementById("app");
      if (!app) return;
      app.innerHTML =
        '<div style="min-height:100dvh;padding:20px;background:#0a0710;color:#fff;font-family:-apple-system,sans-serif">' +
        '<h1 style="color:#ff7785">処理エラー</h1>' +
        '<p>画面のスクショを送ってね。</p>' +
        '<pre style="white-space:pre-wrap;background:#1b1223;padding:12px;border-radius:12px">' +
        String(event.reason?.message || event.reason || "Unknown rejection") +
        '</pre></div>';
    });
  </script>
  <script type="module" src="./src/main.js?v=0.5.0-alpha.1"></script>
</body>
</html>
